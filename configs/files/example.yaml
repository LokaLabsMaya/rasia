# Application configuration
app:
  # Service name
  name: rasia
# Log configuration
log:
  # Log level (0: Panic, 1: Fatal, 2: Error, 3: Warn, 4: Info, 5: Debug, 6: Trace), default is 6
  level: 6
  # Log format (text: text format, json: json format), default is text
  format: text
  # Redacted fields are fields that will be redacted in the log
  redacted_fields: ["auth", "password", "auth_token", "access_token", "refresh_token", "api_key", "phone_number", "phone", "telephone", "api_secret", "api_token", "api_key_id", "api_key_secret", "api_key_id_secret"]
# HTTP configuration
http:
  # HTTP server port
  port: 8000
  # Maximum duration for reading the entire request, including the body
  read_timeout: 60s
  # Maximum duration for writing the response body
  write_timeout: 60s
  # Maximum amount of time to wait for the next request when keep-alives are enabled
  idle_timeout: 120s
  # Maximum time to wait for HTTP server to start
  start_timeout: 30s
  # Maximum time to wait for in-flight requests to complete during graceful shutdown
  stop_timeout: 5s            
  # Enable print routes
  enable_print_routes: true
  # Disable startup message
  disable_startup_message: false
  # Allowed origins for CORS
  allowed_origins: ["*"]
# Secrets configuration
secrets:
  # Path to the SQLite database file for secrets storage
  db_path: secrets.db
# Crypto configuration
crypto:
  # AES-256-GCM encryption key (32 bytes hex or any string — Argon2id derives the actual key)
  key: change-me-in-production
