# Development deployment — Tailnet access via Traefik tailscale entrypoint
services:
  rasia:
    image: ${GITHUB_IMAGE:-ghcr.io/lokalabsmaya/rasia}:${IMAGE_TAG:-development}
    container_name: rasia-dev
    restart: unless-stopped
    command: ["http", "--config", "/rasia/configs/files/default.yaml"]
    volumes:
      - /home/lokalabs/data/infra/rasia/rasia-dev:/rasia/secrets
      - ./configs/files/default.yaml:/rasia/configs/files/default.yaml:ro
    networks:
      - development
    labels:
      - traefik.enable=true
      - traefik.docker.network=development
      - traefik.http.routers.rasia-dev.rule=Host(`${RASIA_HOST:-dev.rasia.lokalabs.buzz}`)
      - traefik.http.routers.rasia-dev.entrypoints=tailscale
      - traefik.http.routers.rasia-dev.tls=true
      - traefik.http.routers.rasia-dev.tls.certresolver=letsencrypt
      - traefik.http.services.rasia-dev.loadbalancer.server.port=8000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8000/ > /dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  development:
    name: development
    external: true
