definitions:
  domain.SecretFileExt:
    enum:
    - env
    - yaml
    - json
    - txt
    type: string
    x-enum-varnames:
    - SecretFileExtEnv
    - SecretFileExtYAML
    - SecretFileExtJSON
    - SecretFileExtTXT
  dto.ReqAddSecret:
    properties:
      key_name:
        maxLength: 255
        type: string
      value:
        type: string
    required:
    - key_name
    - value
    type: object
  dto.ReqCreateNamespace:
    properties:
      name:
        maxLength: 255
        type: string
      parent_id:
        type: string
    required:
    - name
    type: object
  dto.ReqCreateSecretFile:
    properties:
      ext:
        allOf:
        - $ref: '#/definitions/domain.SecretFileExt'
        enum:
        - env
        - yaml
        - json
        - txt
      name:
        maxLength: 255
        type: string
    required:
    - ext
    - name
    type: object
  dto.ReqSaveFileContent:
    properties:
      content:
        type: string
    required:
    - content
    type: object
  dto.ReqUpdateSecret:
    properties:
      value:
        type: string
    required:
    - value
    type: object
  dto.ResFileContent:
    properties:
      content:
        type: string
    type: object
  dto.ResNamespace:
    properties:
      children:
        items:
          $ref: '#/definitions/dto.ResNamespace'
        type: array
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      parent_id:
        type: string
      updated_at:
        type: string
    type: object
  dto.ResRevealSecret:
    properties:
      value:
        type: string
    type: object
  dto.ResSecret:
    properties:
      created_at:
        type: string
      file_id:
        type: string
      id:
        type: string
      key_name:
        type: string
      updated_at:
        type: string
    type: object
  dto.ResSecretFile:
    properties:
      created_at:
        type: string
      ext:
        $ref: '#/definitions/domain.SecretFileExt'
      id:
        type: string
      name:
        type: string
      namespace_id:
        type: string
      updated_at:
        type: string
    type: object
  pagination.Result:
    properties:
      cursor:
        $ref: '#/definitions/pagination.ResultPaginationCursor'
      offset:
        $ref: '#/definitions/pagination.ResultPaginationOffset'
      type:
        type: string
    type: object
  pagination.ResultPaginationCursor:
    properties:
      next:
        type: string
      prev:
        type: string
      total_data:
        type: integer
    type: object
  pagination.ResultPaginationOffset:
    properties:
      current_page:
        type: integer
      per_page:
        type: integer
      total_data:
        type: integer
      total_page:
        type: integer
    type: object
  response.Metadata:
    properties:
      correlation_id:
        type: string
      pagination:
        $ref: '#/definitions/pagination.Result'
      request_id:
        type: string
    type: object
  response.ResponseSuccess:
    properties:
      data: {}
      message:
        example: success
        type: string
      metadata:
        $ref: '#/definitions/response.Metadata'
      success:
        example: true
        type: boolean
    type: object
info:
  contact: {}
  description: This is a documentation for rasia Service RESTful APIs. <br>
  title: rasia Service API
paths:
  /api/export:
    get:
      description: Resolves a namespace path and returns all decrypted files
      parameters:
      - description: Namespace path (e.g. production/application)
        in: query
        name: path
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResponseSuccess'
      summary: Export Secrets
      tags:
      - Export
  /api/files/{file_id}/content:
    get:
      description: Returns decrypted file content
      parameters:
      - description: File ID
        in: path
        name: file_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.ResponseSuccess'
            - properties:
                data:
                  $ref: '#/definitions/dto.ResFileContent'
              type: object
      summary: Get File Content
      tags:
      - FileContent
    put:
      consumes:
      - application/json
      description: Encrypts and upserts file content
      parameters:
      - description: File ID
        in: path
        name: file_id
        required: true
        type: string
      - description: Content
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ReqSaveFileContent'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResponseSuccess'
      summary: Save File Content
      tags:
      - FileContent
  /api/files/{file_id}/secrets:
    get:
      description: Returns all secrets in a file (values masked)
      parameters:
      - description: File ID
        in: path
        name: file_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.ResponseSuccess'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.ResSecret'
                  type: array
              type: object
      summary: List Secrets
      tags:
      - Secrets
    post:
      consumes:
      - application/json
      description: Encrypts and stores a new key-value pair
      parameters:
      - description: File ID
        in: path
        name: file_id
        required: true
        type: string
      - description: Secret data
        in: body
        name: secret
        required: true
        schema:
          $ref: '#/definitions/dto.ReqAddSecret'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.ResponseSuccess'
      summary: Add Secret
      tags:
      - Secrets
  /api/files/{id}:
    delete:
      description: Soft-deletes a file and its secrets/content
      parameters:
      - description: File ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResponseSuccess'
      summary: Delete Secret File
      tags:
      - SecretFiles
  /api/namespaces:
    post:
      consumes:
      - application/json
      description: Creates a new namespace node
      parameters:
      - description: Namespace data
        in: body
        name: namespace
        required: true
        schema:
          $ref: '#/definitions/dto.ReqCreateNamespace'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.ResponseSuccess'
      summary: Create Namespace
      tags:
      - Namespaces
  /api/namespaces/{id}:
    delete:
      description: Soft-deletes a namespace and its descendants
      parameters:
      - description: Namespace ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResponseSuccess'
      summary: Delete Namespace
      tags:
      - Namespaces
  /api/namespaces/{namespace_id}/files:
    get:
      description: Returns all files in a namespace
      parameters:
      - description: Namespace ID
        in: path
        name: namespace_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.ResponseSuccess'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.ResSecretFile'
                  type: array
              type: object
      summary: List Secret Files
      tags:
      - SecretFiles
    post:
      consumes:
      - application/json
      description: Creates a new file in a namespace
      parameters:
      - description: Namespace ID
        in: path
        name: namespace_id
        required: true
        type: string
      - description: File data
        in: body
        name: file
        required: true
        schema:
          $ref: '#/definitions/dto.ReqCreateSecretFile'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.ResponseSuccess'
      summary: Create Secret File
      tags:
      - SecretFiles
  /api/namespaces/tree:
    get:
      description: Returns the full namespace tree
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.ResponseSuccess'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.ResNamespace'
                  type: array
              type: object
      summary: Get Namespace Tree
      tags:
      - Namespaces
  /api/secrets/{id}:
    delete:
      description: Soft-deletes a secret
      parameters:
      - description: Secret ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResponseSuccess'
      summary: Delete Secret
      tags:
      - Secrets
    put:
      consumes:
      - application/json
      description: Encrypts and updates an existing key-value pair
      parameters:
      - description: Secret ID
        in: path
        name: id
        required: true
        type: string
      - description: Secret data
        in: body
        name: secret
        required: true
        schema:
          $ref: '#/definitions/dto.ReqUpdateSecret'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ResponseSuccess'
      summary: Update Secret
      tags:
      - Secrets
  /api/secrets/{id}/reveal:
    get:
      description: Decrypts and returns the plaintext value
      parameters:
      - description: Secret ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.ResponseSuccess'
            - properties:
                data:
                  $ref: '#/definitions/dto.ResRevealSecret'
              type: object
      summary: Reveal Secret
      tags:
      - Secrets
securityDefinitions:
  BasicAuth:
    type: basic
  BearerToken:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
